---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        run: |
          find hooks/ -name '*.sh' -type f -exec shellcheck -x -S warning {} +

  test-install:
    name: Test Install
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      matrix:
        mode: [link, copy]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run install script
        run: |
          chmod +x install.sh
          ./install.sh --${{ matrix.mode }}

      - name: Verify installation
        run: |
          test -f ~/CLAUDE.md
          test -d ~/.claude
          test -f ~/.claude/settings.json

      - name: Run uninstall script
        run: |
          chmod +x uninstall.sh
          ./uninstall.sh

      - name: Verify uninstall
        run: |
          test ! -f ~/CLAUDE.md
          test ! -f ~/.claude/settings.json

  reuse:
    name: REUSE Compliance
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275b44e27d7571 # v5.0.0
