---
name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Install dotclaude with `./install.sh --link`
        2. Open a Claude Code session
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component Affected
      description: Which part of dotclaude is affected?
      options:
        - Rules (rules/)
        - Agents (agents/)
        - Hooks (hooks/)
        - Skills (skills/)
        - Install script (install.sh)
        - Templates (templates/)
        - Configuration (CLAUDE.md, settings.json)
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 24.04, macOS 15.2"

  - type: input
    id: claude-version
    attributes:
      label: Claude Code Version
      placeholder: "e.g., 1.0.25"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (logs, screenshots, etc.)
