---
name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: Describe the use case or workflow this would improve
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of dotclaude would this affect?
      options:
        - Rules (rules/)
        - Agents (agents/)
        - Hooks (hooks/)
        - Skills (skills/)
        - Templates (templates/)
        - Install/Uninstall scripts
        - Configuration (CLAUDE.md, settings.json)
        - CI/CD / Workflows
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information, examples, or references
